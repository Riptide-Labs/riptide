name: Publish RC
run-name: Publish floating rc container image from main
on:
  workflow_dispatch:
  push:
    branches: [ 'main' ]
    paths-ignore: [ 'docs/**' ]

permissions:
  contents: read

# Only the newest main commit needs to be :rc — cancel the ones it overtook.
concurrency:
  group: publish-rc
  cancel-in-progress: true

jobs:
  publish:
    # :rc always reflects main — also guards manual dispatches from other refs
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read    # job-level block replaces the top-level one — checkout still needs this
      packages: write   # push the :rc image to GHCR
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Set version, date and short git hash
        run: |
          {
            echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
            echo "SHORT_GIT_SHA=$(git rev-parse --short HEAD)"
            echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "${GITHUB_ENV}"
      - name: Build with tests
        run: |
          make
      - name: Login to Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push floating rc image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DATE=${{ env.BUILD_DATE }}
            GIT_SHORT_HASH=${{ env.SHORT_GIT_SHA }}
            VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/riptide-labs/riptide:rc
      # No untagged-version cleanup here. cosign 3 attaches signatures as OCI
      # referrers — untagged manifests hanging off the signed release digest —
      # so a package-wide `delete-untagged` sweep strips released images of
      # their signatures. It did: 0.4.10 and 0.4.11 no longer verify. The
      # moving :rc tag overwriting its predecessor is the space control.
