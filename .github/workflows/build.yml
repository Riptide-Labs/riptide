name: Riptide Build
run-name: Build and Test the application
on:
  workflow_dispatch:
  push:
    branches: [ 'main' ]  # post-merge run on main; tags are the release workflow's
  pull_request:
    branches: [ 'main' ]  # every PR targeting main, on open and on each new push
    # No `types:` filter — naming one replaces the default set, and dropping
    # `synchronize` from it means pushes to an open PR never rebuild.

permissions:
  contents: read

# Superseded pushes to the same PR are wasted runner minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Set version number, date and short git hash
        run: |
          {
            echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
            echo "SHORT_GIT_SHA=$(git rev-parse --short HEAD)"
            echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "${GITHUB_ENV}"
      - name: Build with tests
        run: |
          make
      - name: Persist JAR artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: riptide-jar
          path: |
            target/*.jar
  e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      # The nl6 container needs NET_ADMIN + SYS_ADMIN and /dev/net/tun.
      # Testcontainers requests them per container; the runner's root Docker
      # daemon grants them without extra runner configuration.
      #
      # Full-mode additionally needs (spike/full-mode-routing runs, July 2026):
      # - unconfined seccomp/AppArmor on the nl6 container (its netns setup
      #   runs `mount --make-shared`, denied by default profiles) — requested
      #   per container by the harness; --privileged is never used
      # - a host route into the simulated device network so riptide can walk
      #   SNMP back to the per-device agents
      - name: Provision full-mode (route into nl6 device network)
        run: |
          docker network create --subnet 172.30.42.0/24 nl6-fullmode
          sudo ip route add 10.42.0.0/16 via 172.30.42.10
          sudo sysctl -w net.ipv4.conf.all.rp_filter=2
          sudo sysctl -w net.ipv4.conf.default.rp_filter=2
      - name: Integration and e2e tests
        run: |
          make e2e
        env:
          RIPTIDE_E2E_FULL_MODE: "1"
      - name: Persist coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-report
          path: target/site/jacoco/
