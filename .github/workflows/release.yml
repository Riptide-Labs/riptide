name: Riptide Release
run-name: Release Workflow
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

# A half-published release is worse than a late one — never cancel in flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write      # upload release assets
      packages: write      # push the container image to GHCR
      id-token: write      # keyless cosign signing via the workflow's OIDC identity
      attestations: write  # SLSA build provenance for the artifacts and the image
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      - name: Check if you accidentally want to release a SNAPSHOT version
        run: |
          POM_VERSION="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          if [[ "${POM_VERSION}" == *"SNAPSHOT"* ]]; then
            echo "Error: Your pom has a SNAPSHOT release. Set the pom to a version number without SNAPSHOT."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${POM_VERSION}" ]]; then
            echo "Error: tag ${GITHUB_REF_NAME} does not match pom version ${POM_VERSION}."
            echo "The image and the binaries would self-report a version nobody can find."
            exit 1
          fi
          echo "VERSION=${POM_VERSION}" >> "${GITHUB_ENV}"
      - name: Resolve image tags
        run: |
          # A prerelease (v1.2.0-rc1) gets its exact version tag and nothing
          # else: :latest and the floating :X.Y must keep pointing at the newest
          # *stable* release.
          image="ghcr.io/riptide-labs/riptide"
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            {
              echo "PRERELEASE=true"
              echo "IMAGE_TAGS=${image}:${VERSION}"
            } >> "${GITHUB_ENV}"
          else
            {
              echo "PRERELEASE=false"
              echo "IMAGE_TAGS=${image}:${VERSION},${image}:${VERSION%.*},${image}:latest"
            } >> "${GITHUB_ENV}"
          fi
      - name: Set date and short git hash
        run: |
          {
            echo "SHORT_GIT_SHA=$(git rev-parse --short HEAD)"
            echo "BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          } >> "${GITHUB_ENV}"
      - name: Build with tests
        run: |
          make
      - name: Build DEB and RPM packages
        run: |
          make packages
      - name: Persist JAR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: riptide-jar
          path: |
            target/*.jar
      # SPDX over the source tree, so the SBOM describes what went into the
      # build rather than what syft can infer from the finished jar.
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: riptide-${{ env.VERSION }}.spdx.json
          output-file: target/riptide-${{ env.VERSION }}.spdx.json
      - name: Login to Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build and push container image
        id: build-image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DATE=${{ env.BUILD_DATE }}
            GIT_SHORT_HASH=${{ env.SHORT_GIT_SHA }}
            VERSION=${{ env.VERSION }}
          tags: ${{ env.IMAGE_TAGS }}
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign container image
        env:
          IMAGE_DIGEST: ${{ steps.build-image.outputs.digest }}
        run: |
          # Sign the digest, not a tag: covers every tag pointing at this image.
          cosign sign --yes "ghcr.io/riptide-labs/riptide@${IMAGE_DIGEST}"
      - name: Sign release artifacts
        run: |
          # cosign 3.x writes the sigstore bundle (sig + cert + Rekor proof in one file);
          # the legacy --output-signature/--output-certificate pair no longer works alone.
          for artifact in target/*.jar target/*.deb target/*.rpm target/*.spdx.json; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "${artifact}"
          done
      # Provenance answers a different question than the cosign signature does:
      # not "did this come from us" but "which workflow, commit and inputs
      # produced it". Verify with `gh attestation verify`.
      - name: Attest build provenance for the release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'target/*.jar, target/*.deb, target/*.rpm'
      - name: Attest build provenance for the container image
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ghcr.io/riptide-labs/riptide
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true
      - name: Release ${{ github.ref_name }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: |
            target/*.jar
            target/*.deb
            target/*.rpm
            target/*.spdx.json
            target/*.sigstore.json
