# Nightly coverage-guided fuzzing of the flow parsers, which consume untrusted UDP off the
# network. The seed corpus and any crash reproducers already replay as ordinary tests in the
# build workflow (jazzer-junit's regression mode); this job is the other half — it actually
# fuzzes, with the discovered corpus cached between runs so coverage compounds night over night.
name: Fuzz
run-name: Nightly parser fuzzing
on:
  workflow_dispatch:
    inputs:
      fuzz_time:
        description: Per-target fuzzing budget in seconds
        default: '180'
  schedule:
    - cron: '23 3 * * *' # nightly

permissions:
  contents: read

concurrency:
  group: fuzz
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false # one target crashing must not cancel the others' runs
      matrix:
        target:
          - Netflow5ParserFuzzTest
          - Netflow9ParserFuzzTest
          - IpfixParserFuzzTest
          - SflowParserFuzzTest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up JDK 25 for x64
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '25'
          distribution: 'temurin'
          architecture: x64
          cache: maven
      # Coverage corpus per target, keyed so each night resumes from the last. The restore-key
      # prefix lets a fresh target seed from any earlier run rather than starting cold.
      - name: Restore fuzzing corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cifuzz-corpus
          key: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
          restore-keys: fuzz-corpus-${{ matrix.target }}-
      - name: Fuzz ${{ matrix.target }}
        env:
          FUZZ_TIME: ${{ github.event.inputs.fuzz_time || '180' }}
          FUZZ_TARGET: ${{ matrix.target }}
        run: |
          make fuzz
      # A crash writes its reproducer under src/test/resources/.../<target>Inputs/. Upload it (and
      # the corpus) so a maintainer can replay it locally, then commit it to lock in the regression.
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: |
            src/test/resources/org/riptide/flows/fuzz/**
            .cifuzz-corpus/**
          if-no-files-found: warn
