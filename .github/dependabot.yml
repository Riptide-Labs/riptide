# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions" # keeps SHA pins + semver comments current
    directory: "/"
    target-branch: "main"
    labels:
      - "dependency update"
    commit-message:
      prefix: "ci"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker" # keeps the digest-pinned base image of the main Dockerfile current
    directory: "/"
    target-branch: "main"
    labels:
      - "dependency update"
    commit-message:
      prefix: "build"
    schedule:
      interval: "weekly"
  - package-ecosystem: "docker" # nfpm pin used by `make packages` (Dockerfile.nfpm)
    directory: "/deployment/package"
    target-branch: "main"
    labels:
      - "dependency update"
    commit-message:
      prefix: "build"
    schedule:
      interval: "weekly"
  - package-ecosystem: "maven" # See documentation for possible values
    directory: "/" # Location of package manifests
    target-branch: "main"
    labels:
      - "dependency update"
    commit-message:
      prefix: "build"
      include: "scope"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm" # Docusaurus documentation site
    directory: "/docs"
    target-branch: "main"
    labels:
      - "dependency update"
    commit-message:
      prefix: "build"
      include: "scope"
    schedule:
      interval: "weekly"
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      # react and react-dom must move together — Docusaurus fails the build if their versions
      # differ, so a split bump (one PR each) leaves both PRs red. Group them into one.
      react:
        patterns:
          - "react"
          - "react-dom"
    ignore:
      # TS 7 removed baseUrl, which @docusaurus/tsconfig still sets; blocked
      # until the Docusaurus toolchain supports TypeScript 7 (see PR #171).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
