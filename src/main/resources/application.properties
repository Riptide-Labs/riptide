spring.main.banner-mode=off
spring.main.web-application-type=none
spring.main.keep-alive=true

spring.config.additional-location=optional:file:/etc/riptide/config.yaml

# DAEMON
# Receivers are empty by default: the daemon starts no listeners. Note that
# entries defined here merge with (and cannot be removed by) external config.
# RECEIVER EXAMPLE
#riptide.receivers.ipfix.type=ipfix
#riptide.receivers.ipfix.host=0.0.0.0
#riptide.receivers.ipfix.port=4739

# CLASSIFICATION EXAMPLE
#riptide.classification.rules=file:/etc/riptide/classification-rules.csv

# CLICKHOUSE
riptide.clickhouse.endpoint=http://localhost:8123
riptide.clickhouse.username=default
riptide.clickhouse.password=
riptide.clickhouse.database=riptide

# SNMP CACHE
riptide.snmp.cache.retentionMs=600000

# SNMP CONFIG EXAMPLE
#riptide.snmp.config.definitions[0].subnet-address=10.20.30.0/24
#riptide.snmp.config.definitions[0].port=161
#riptide.snmp.config.definitions[0].snmp-version=v2c
#riptide.snmp.config.definitions[0].community=c0mmunity

# ENRICHER: HOSTNAMES
riptide.enricher.hostnames.enabled=false
