spring.main.banner-mode=off
spring.main.web-application-type=none
spring.main.keep-alive=true

spring.config.import=optional:file:/etc/riptide/config.yaml

# DAEMON
# Receivers are empty by default: the daemon starts no listeners. Note that
# entries defined here merge with (and cannot be removed by) external config.
# RECEIVER EXAMPLE
#riptide.receivers.ipfix.type=ipfix
#riptide.receivers.ipfix.host=0.0.0.0
#riptide.receivers.ipfix.port=4739

# CLASSIFICATION EXAMPLE
#riptide.classification.rules=file:/etc/riptide/classification-rules.csv

# CLICKHOUSE
# username/password are SecretRefs: a bare literal binds via the plain fallback, a scheme://
# reference (env://, file://, vault://, sops://) is resolved from a secret store at startup.
# Leave password unset for the default user's empty password (a blank value is not a valid ref).
riptide.clickhouse.endpoint=http://localhost:8123
riptide.clickhouse.username=default
#riptide.clickhouse.password=vault://secret/riptide/clickhouse#password
riptide.clickhouse.database=riptide

# SNMP CACHE
riptide.snmp.cache.retentionMs=600000

# NODES EXAMPLE
# Nodes are a name-keyed map. A node matches exporters by subnet (optionally pinned
# to one observation domain / source ID); pinned nodes beat wildcard ones and the
# longest subnet prefix wins — declaration order never matters.
# SNMP credentials (community, auth-passphrase, priv-passphrase) are secret
# references, resolved at poll time — never put plaintext secrets here:
#   env://NAME                                          environment variable
#   file:///run/secrets/community                       file content (trimmed)
#   file:///etc/riptide/sec.properties#snmp.community   key in a properties file
#   vault://secret/snmp/core-router#community           HashiCorp Vault KV v2 (<mount>/<path>#<key>)
#   sops:///etc/riptide/secrets.yaml#snmp.community     SOPS-encrypted YAML/JSON (decrypted via the sops binary)
#riptide.nodes.core-router.subnet-address=10.20.30.0/24
#riptide.nodes.core-router.observation-domain=42
#riptide.nodes.core-router.snmp.port=161
#riptide.nodes.core-router.snmp.snmp-version=v2c
#riptide.nodes.core-router.snmp.community=env://RIPTIDE_SNMP_COMMUNITY
# Optionally restrict file:// access:
#riptide.secrets.allowed-paths=/run/secrets,/etc/riptide
# Vault (enables the vault:// resolver; token e.g. from a Vault Agent sink):
#riptide.secrets.vault.uri=https://vault.example.com:8200
#riptide.secrets.vault.token=${VAULT_TOKEN}
# SOPS (age key for decryption; command defaults to `sops` on the PATH):
#riptide.secrets.sops.command=sops
#riptide.secrets.sops.age-key-file=/etc/riptide/age.key

# ENRICHER: HOSTNAMES
riptide.enricher.hostnames.enabled=false

# MANAGEMENT
# Plain-HTTP health endpoints for Kubernetes probes / Docker Compose healthchecks:
#   GET /livez  — process liveness (receiver event loops alive); never touches ClickHouse
#   GET /readyz — readiness (all receivers bound and listening); excludes ClickHouse by design
riptide.management.enabled=true
riptide.management.port=8080
riptide.management.bind-address=0.0.0.0
