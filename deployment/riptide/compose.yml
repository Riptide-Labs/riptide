---
include:
  - ../clickhouse/compose.yml

services:
  riptide:
    image: ghcr.io/riptide-labs/riptide:latest
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      TZ: UTC
      LOGGING_LEVEL_ROOT: WARN
      RIPTIDE_CLICKHOUSE_ENDPOINT: http://clickhouse:8123
      RIPTIDE_CLICKHOUSE_USERNAME: default
      RIPTIDE_CLICKHOUSE_PASSWORD: ""
      RIPTIDE_CLICKHOUSE_DATABASE: riptide
    ports:
      - "9999:9999/udp"
    healthcheck:
      # BusyBox wget is present in the temurin-alpine image; /readyz is 200 once receivers are listening
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

