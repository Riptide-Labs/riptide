---
apiVersion: 1

datasources:
  - name: ClickHouse
    # Stable uid so provisioned dashboards can reference this datasource.
    uid: riptide-clickhouse
    type: grafana-clickhouse-datasource
    jsonData:
      defaultDatabase: riptide
      port: 9000
      host: clickhouse
      username: default
      tlsSkipVerify: false
    secureJsonData:
      password: ""
